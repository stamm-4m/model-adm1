# ============================================================
# Configuration de l'influent
# ============================================================
# Ce fichier définit les conditions d'alimentation du digesteur.
# Deux modes sont disponibles : dynamique (fichier CSV) ou constant.
# Le mode actif est sélectionné dans scenarios/scenarios.yaml.
# ============================================================

# ------ Mode dynamique (série temporelle) ------
dynamic:
  description: "Influent dynamique issu de données journalières BSM2"
  type: dynamic
  file_path: "configs/daily_averages.csv"
  time_column: "time"
  time_units: "d"
  variables:
    # Variables solubles
    - S_su      # Monosaccharides          [kgCOD.m^-3]
    - S_aa      # Acides aminés             [kgCOD.m^-3]
    - S_fa      # LCFA                      [kgCOD.m^-3]
    - S_va      # Valérate                  [kgCOD.m^-3]
    - S_bu      # Butyrate                  [kgCOD.m^-3]
    - S_pro     # Propionate                [kgCOD.m^-3]
    - S_ac      # Acétate                   [kgCOD.m^-3]
    - S_h2      # Hydrogène dissous         [kgCOD.m^-3]
    - S_ch4     # Méthane dissous           [kgCOD.m^-3]
    - S_IC      # Carbone inorganique       [kmol C.m^-3]
    - S_IN      # Azote inorganique         [kmol N.m^-3]
    - S_I       # COD soluble inerte        [kgCOD.m^-3]
    # Variables particulaires
    - X_xc      # Matière composite         [kgCOD.m^-3]
    - X_ch      # Glucides                  [kgCOD.m^-3]
    - X_pr      # Protéines                 [kgCOD.m^-3]
    - X_li      # Lipides                   [kgCOD.m^-3]
    - X_su      # Biomasse sucres           [kgCOD.m^-3]
    - X_aa      # Biomasse acides aminés    [kgCOD.m^-3]
    - X_fa      # Biomasse LCFA             [kgCOD.m^-3]
    - X_c4      # Biomasse C4               [kgCOD.m^-3]
    - X_pro     # Biomasse propionate       [kgCOD.m^-3]
    - X_ac      # Biomasse acétate          [kgCOD.m^-3]
    - X_h2      # Biomasse hydrogène        [kgCOD.m^-3]
    - X_I       # COD particulaire inerte   [kgCOD.m^-3]
    # Ions
    - S_cation  # Cations forts             [M]
    - S_anion   # Anions forts              [M]

# ------ Mode constant ------ Il faut définir toutes les variables 
constant:
  description: "Influent constant - valeurs moyennes BSM2 (Rosen et al., 2006)"
  type: constant
  pH:
    value: 7.2
    units: "-"
  # Débit
  q_ad:
    value: 178.4674
    units: "m^3.d^-1"
  # Variables solubles
  S_su:
    value: 0.01
    units: "kgCOD.m^-3"
  S_aa:
    value: 0.001
    units: "kgCOD.m^-3"
  S_fa:
    value: 0.001
    units: "kgCOD.m^-3"
  S_va:
    value: 0.001
    units: "kgCOD.m^-3"
  S_bu:
    value: 0.001
    units: "kgCOD.m^-3"
  S_pro:
    value: 0.001
    units: "kgCOD.m^-3"
  S_ac:
    value: 0.001
    units: "kgCOD.m^-3"
  S_h2:
    value: 1.0e-8
    units: "kgCOD.m^-3"
  S_ch4:
    value: 1.0e-5
    units: "kgCOD.m^-3"
  S_IC:
    value: 0.04
    units: "kmol C.m^-3"
  S_IN:
    value: 0.01
    units: "kmol N.m^-3"
  S_I:
    value: 0.02
    units: "kgCOD.m^-3"
  # Variables particulaires
  X_xc:
    value: 2.0
    units: "kgCOD.m^-3"
  X_ch:
    value: 0.5
    units: "kgCOD.m^-3"
  X_pr:
    value: 0.5
    units: "kgCOD.m^-3"
  X_li:
    value: 0.4
    units: "kgCOD.m^-3"
  X_su:
    value: 0.0
    units: "kgCOD.m^-3"
  X_aa:
    value: 0.0
    units: "kgCOD.m^-3"
  X_fa:
    value: 0.0
    units: "kgCOD.m^-3"
  X_c4:
    value: 0.0
    units: "kgCOD.m^-3"
  X_pro:
    value: 0.0
    units: "kgCOD.m^-3"
  X_ac:
    value: 0.0
    units: "kgCOD.m^-3"
  X_h2:
    value: 0.0
    units: "kgCOD.m^-3"
  X_I:
    value: 0.0
    units: "kgCOD.m^-3"
  S_cation:
    value: 0.04
    units: "M"
  S_anion:
    value: 0.02
    units: "M"



# ------ Nouvel Influent : Lisier de Porc (Forte charge Azote) ------
lisier_porc:
  description: "Lisier de porc mésophile recalibré pour un démarrage avec pH plus réaliste"
  type: constant
  pH:     {value: 7.2, units: "-"}

  # Solubles
  S_su:   {value: 0.15, units: "kgCOD.m^-3"}
  S_aa:   {value: 0.80, units: "kgCOD.m^-3"}
  S_fa:   {value: 0.05, units: "kgCOD.m^-3"}
  S_va:   {value: 0.001, units: "kgCOD.m^-3"}
  S_bu:   {value: 0.001, units: "kgCOD.m^-3"}
  S_pro:  {value: 0.001, units: "kgCOD.m^-3"}
  S_ac:   {value: 0.02, units: "kgCOD.m^-3"}
  S_h2:   {value: 1.0e-8, units: "kgCOD.m^-3"}
  S_ch4:  {value: 1.0e-5, units: "kgCOD.m^-3"}
  S_IC:   {value: 0.12, units: "kmol C.m^-3"}
  S_IN:   {value: 0.08, units: "kmol N.m^-3"}
  S_I:    {value: 0.30, units: "kgCOD.m^-3"}

  # Particulaires
  X_xc:   {value: 6.0, units: "kgCOD.m^-3"}
  X_ch:   {value: 1.0, units: "kgCOD.m^-3"}
  X_pr:   {value: 2.5, units: "kgCOD.m^-3"}
  X_li:   {value: 0.8, units: "kgCOD.m^-3"}
  X_su:   {value: 0.0, units: "kgCOD.m^-3"}
  X_aa:   {value: 0.0, units: "kgCOD.m^-3"}
  X_fa:   {value: 0.0, units: "kgCOD.m^-3"}
  X_c4:   {value: 0.0, units: "kgCOD.m^-3"}
  X_pro:  {value: 0.0, units: "kgCOD.m^-3"}
  X_ac:   {value: 0.0, units: "kgCOD.m^-3"}
  X_h2:   {value: 0.0, units: "kgCOD.m^-3"}
  X_I:    {value: 2.0, units: "kgCOD.m^-3"}

  # Ions
  S_cation: {value: 0.07, units: "M"}
  S_anion:  {value: 0.03, units: "M"}
