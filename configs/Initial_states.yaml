# ============================================================
# Digester initial states
# ============================================================
# This file describes the digester state at t=0.
# Values taken from Rosen et al. (2006) BSM2 report.
# Multiple initial-state sets can be defined and selected
# via configs/scenarios/scenarios.yaml.
# ============================================================

