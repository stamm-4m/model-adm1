# ============================================================
# États initiaux du digesteur
# ============================================================
# Ce fichier décrit l'état du digesteur au temps t=0.
# Valeurs issues de Rosen et al. (2006) BSM2 report.
# Plusieurs jeux d'états initiaux peuvent être définis
# et sélectionnés via configs/scenarios/scenarios.yaml.
# ============================================================

