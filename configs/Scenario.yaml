# ============================================================
# ADM1 simulation scenarios
# ============================================================
# This file defines the simulation cases to run.
# Each scenario bundles the structural choices required:
# - initial states, influent mode, duration, parameter overrides
#   (for now, only scenarios with a temperature change).
# ============================================================

# ------ Active scenario ------
# active_scenario: BSM2_dynamic
active_scenario : thermophilic

# ------ Scenario definitions ------
scenarios:

  # --- Reference BSM2 scenario with dynamic influent ---
  BSM2_dynamic:
    description: >
      Reference BSM2 simulation (Rosen et al., 2006).
      Mesophilic conditions (35 C), daily dynamic influent.
    initial_states: BSM2            # Key in configs/states/initial_states.yaml
    influent_mode: dynamic          # Key in configs/influent/influent.yaml
    T_op:
      value: 308.15
      units: "K"
      description: "Operating temperature (mesophilic, 35 C)"
    parameter_overrides: {}         # No override — uses adm1_parameters.yaml

  # --- BSM2 scenario with constant influent ---
  BSM2_constant:
    description: >
      BSM2 simulation with a constant influent (mean values).
      Useful to reach a reference steady state.
    initial_states: BSM2
    influent_mode: constant
    T_op:
      value: 308.15
      units: "K"
      description: "Operating temperature (mesophilic, 35 C)"
    parameter_overrides: {}

  # --- Thermophilic scenario (example) ---
  thermophilic:
    description: >
      Thermophilic conditions (55 C) with the BSM2 dynamic influent.
      Higher ammonia concentration.
    initial_states: BSM2
    influent_mode: dynamic
    T_op:
      value: 328.15
      units: "K"
      description: "Operating temperature (thermophilic, 55 C)"
    parameter_overrides:
      K_I_nh3:
        value: 0.003
        units: "M"
        description: "Increased NH3 inhibition constant in thermophilic regime"

  # --- Batch-validation scenario (example) ---
  batch_validation:
    description: >
      Batch-mode simulation (no feed).
      Useful to validate the biochemical kinetics.
    initial_states: BSM2
    influent_mode: constant
    T_op:
      value: 308.15
      units: "K"
    parameter_overrides:
      q_ad:
        value: 0.0
        units: "m^3.d^-1"
        description: "Zero flow — batch mode"

  # --- New scenario: pig-slurry test ---
  pig_slurry_test:
    description: >
      Pig-slurry simulation under mesophilic conditions.
      Starts from the BSM2 initial state to ensure numerical stability.
    initial_states: BSM2
    influent_mode: pig_slurry
    T_op:
      value: 308.15
      units: "K"
    parameter_overrides:
      q_ad:
        value: 35.0
        units: "m^3.d^-1"
        description: "Reduced flow for a stable start-up on pig slurry"
