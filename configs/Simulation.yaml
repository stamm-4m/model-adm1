# ============================================================
# Numerical settings for the ADM1 simulation
# ============================================================
# This file is dedicated to numerical resolution of the equations.
# It is independent from the physical content of the model.
# ============================================================

# ------ ODE solver ------
solver:
  method: "BDF"          # Options: "RK45", "DOP853", "BDF", "Radau", "LSODA"
  rtol: 1.0e-6            # Relative tolerance
  atol: 1.0e-8            # Absolute tolerance
  max_step: 1.0           # Maximum time step [d] (inf = unconstrained)
  dense_output: false     # Dense output (interpolation between steps)

# ------ Duration and output time step ------
time:
  t_start: 0             # Start time [d]
  t_end: null            # null = determined by the length of the influent data; revisit because the influent is sometimes constant
  t_end_default_constant : 30 # Default duration when the influent is constant
  dt_out: 1.0            # Output time step [d] (1 = daily)
  units: "d"

# ------ Result-saving options ------
output:
  save_results: true
  output_dir: "results/"
  filename: "dynamic_out.csv"
  state_variables:        # Variables to save (null = all)
    - S_su
    - S_aa
    - S_fa
    - S_va
    - S_bu
    - S_pro
    - S_ac
    - S_h2
    - S_ch4
    - S_IC
    - S_IN
    - S_I
    - X_xc
    - X_ch
    - X_pr
    - X_li
    - X_su
    - X_aa
    - X_fa
    - X_c4
    - X_pro
    - X_ac
    - X_h2
    - X_I
    - S_cation
    - S_anion
    - S_H_ion
    - S_va_ion
    - S_bu_ion
    - S_pro_ion
    - S_ac_ion
    - S_hco3_ion
    - S_nh3
    - S_gas_h2
    - S_gas_ch4
    - S_gas_co2
    - S_co2
    - S_nh4_ion

# ------ Progress output ------
verbose:
  print_time: true        # Print simulation time at each step
  print_interval: 1       # Print every N steps (avoids flooding the console)
