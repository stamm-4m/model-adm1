# ------ Inhibition parameters ------
inhibition_parameters:
  pH_UL_aa:
    value: 5.5
    units: "-"
    description: "Upper pH limit for amino-acid degraders"
  pH_LL_aa:
    value: 4.0
    units: "-"
    description: "Lower pH limit for amino-acid degraders"
  pH_UL_ac:
    value: 7.0
    units: "-"
    description: "Upper pH limit for acetate degraders"
  pH_LL_ac:
    value: 6.0
    units: "-"
    description: "Lower pH limit for acetate degraders"
  pH_UL_h2:
    value: 6.0
    units: "-"
    description: "Upper pH limit for hydrogen degraders"
  pH_LL_h2:
    value: 5.0
    units: "-"
    description: "Lower pH limit for hydrogen degraders"
  K_I_h2_fa:
    value: 5.0e-6
    units: "kgCOD.m^-3"
    description: "H2 inhibition constant for fatty acids"
  K_I_h2_c4:
    value: 1.0e-5
    units: "kgCOD.m^-3"
    description: "H2 inhibition constant for butyrate/valerate"
  K_I_h2_pro:
    value: 3.5e-6
    units: "kgCOD.m^-3"
    description: "H2 inhibition constant for propionate"
  K_I_nh3:
    value: 0.0018
    units: "M"
    description: "Inhibition constant for free ammonia"

# ------ Physico-chemical parameters ------
physico_chemical_parameters:
  K_a_va:
    value: 1.38e-5
    units: "M"
    description: "Acid dissociation constant of valerate"
  K_a_bu:
    value: 1.5e-5
    units: "M"
    description: "Acid dissociation constant of butyrate"
  K_a_pro:
    value: 1.32e-5
    units: "M"
    description: "Acid dissociation constant of propionate"
  K_a_ac:
    value: 1.74e-5
    units: "M"
    description: "Acid dissociation constant of acetate"
  # Added for COD computation
  K_w:
    value: 2.08e-14
    units: "M"
    description: "Water dissociation constant at operating temperature"
  K_a_co2:
    value: 4.94e-7
    units: "M"
    description: "Acid-base equilibrium constant for CO2/HCO3- at operating temperature"
  K_a_IN:
    value: 1.11e-9
    units: "M"
    description: "Acid-base equilibrium constant for NH4+/NH3 at operating temperature"
  ##-----
  k_A_B_va:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for valerate"
  k_A_B_bu:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for butyrate"
  k_A_B_pro:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for propionate"
  k_A_B_ac:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for acetate"
  k_A_B_co2:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for CO2"
  k_A_B_IN:
    value: 1.0e10
    units: "M^-1.d^-1"
    description: "Association rate constant for inorganic nitrogen"
  k_p:
    value: 5.0e4
    units: "m^3.d^-1.bar^-1"
    description: "Friction constant for gas outflow"
  k_L_a:
    value: 200.0
    units: "d^-1"
    description: "Liquid-gas transfer coefficient"
  K_H_co2:
    value: 0.0271
    units: "Mliq.bar^-1"
    description: "Henry constant for CO2 (at T_base)"
  K_H_ch4:
    value: 0.00116
    units: "Mliq.bar^-1"
    description: "Henry constant for CH4 (at T_base)"
  K_H_h2:
    value: 7.38e-4
    units: "Mliq.bar^-1"
    description: "Henry constant for H2 (at T_base)"

# ------ Default reactor parameters ------
reactor_parameters:
  V_liq:
    value: 3400
    units: "m^3"
    description: "Reactor liquid volume (default BSM2 value)"
  V_gas:
    value: 300
    units: "m^3"
    description: "Reactor gas volume (default BSM2 value)"
  V_ad:
    value: 3700
    units: "m^3"
    description: "Total reactor volume (V_liq + V_gas)"
  q_ad:
    value: 178.4674
    units: "m^3.d^-1"
    description: "Anaerobic digester inflow (default BSM2 value)"
  T_op:
    value: 308.15
    units: "K"
    description: "Default operating temperature (mesophilic, 35 C)"
