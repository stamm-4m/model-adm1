# ============================================================
# ADM1 Parameters - Central reference of the model
# ============================================================
# This file contains only the intrinsic ADM1 model parameters,
# independent of the simulation conditions.
# Values from Rosen et al. (2006) BSM2 report
# and Batstone et al. (2002).
# ============================================================

# ------ General constants ------
constants:
  R:
    value: 0.083145
    units: "bar.M^-1.K^-1"
    description: "Universal gas constant"
  T_base:
    value: 298.15
    units: "K"
    description: "Reference temperature"
  p_atm:
    value: 1.013
    units: "bar"
    description: "Atmospheric pressure"

